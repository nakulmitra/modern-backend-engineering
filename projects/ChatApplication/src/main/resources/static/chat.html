<!DOCTYPE html>
<html>

<head>
    <script src=
"https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js">
    </script>

    <script src=
"https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js">
    </script>
</head>

<body>

<input id="message"/>

<button onclick="send()">
    Send
</button>

<div id="chat"></div>

<script>

let socket =
new SockJS('/chat');

let stompClient =
Stomp.over(socket);

stompClient.connect(
{},
function() {

    stompClient.subscribe(
        '/topic/messages',
        function(message) {

            document
            .getElementById("chat")
            .innerHTML +=
            "<p>"
            + message.body +
            "</p>";
        });
});

function send() {

    let msg =
        document.getElementById(
            "message").value;

    stompClient.send(
        "/app/send",
        {},
        msg);
}

</script>

</body>
</html>
